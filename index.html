<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Luminol - 高性能 Minecraft 服务端</title>
        <meta
            name="description"
            content="Luminol 是一款专为技术型玩家和大型服务器设计的高性能 Minecraft 服务端，提供极致的优化与丰富的特性。"
        />
        <meta
            name="keywords"
            content="Minecraft, Server, Luminol, LuminolMC, PaperMC, Purpur, 优化, 高性能, 服务端"
        />
        <meta name="author" content="Luminol Team" />
        <script>
            (function () {
                var p = localStorage.getItem("theme") || "system";
                var d =
                    p === "dark" ||
                    (p === "system" &&
                        matchMedia("(prefers-color-scheme:dark)").matches);
                document.documentElement.setAttribute(
                    "data-theme",
                    d ? "dark" : "light",
                );
                window.__INITIAL_DARK__ = d;
            })();
        </script>
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="preconnect" href="https://rsms.me/" />
        <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    </head>
    <body style="margin: 0">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
